<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grace Tech Solutions | Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --gts-green: #2da65e;
            --gts-blue: #1a2e84;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(1.5rem, 6vw, 3rem);
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 18% 18%, rgba(45, 166, 94, 0.35), transparent 55%),
                radial-gradient(circle at 82% 20%, rgba(26, 46, 132, 0.45), transparent 60%),
                linear-gradient(155deg, #0b1120, #1a2e84 55%, #0d1428 100%);
            color: #e2e8f0;
            text-align: center;
        }

        main {
            width: min(640px, 92vw);
            display: grid;
            gap: clamp(1rem, 3vw, 1.8rem);
            justify-items: center;
        }

        .logo-badge {
            width: clamp(90px, 17vw, 120px);
            aspect-ratio: 1;
            border-radius: 32px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.12);
            border: 1.4px solid rgba(226, 232, 240, 0.35);
            box-shadow: 0 24px 60px -40px rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
        }

        .logo-badge img {
            width: 70%;
            height: auto;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }

        h1 {
            margin: 0;
            font-size: clamp(4rem, 14vw, 7rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #f8fafc;
        }

        h2 {
            margin: 0;
            font-size: clamp(1.7rem, 4vw, 2.4rem);
            font-weight: 600;
            color: rgba(241, 245, 249, 0.9);
        }

        p {
            margin: 0;
            max-width: 38ch;
            font-size: clamp(1rem, 2.7vw, 1.2rem);
            line-height: 1.7;
            color: rgba(226, 232, 240, 0.84);
        }

        .cta-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: clamp(1.2rem, 3vw, 2rem);
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            padding: 0.95rem 1.9rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .cta-button.primary {
            background: linear-gradient(120deg, var(--gts-green), #3ecb7d);
            color: #052e16;
            box-shadow: 0 20px 44px -22px rgba(45, 166, 94, 0.85);
        }

        .cta-button.primary:hover,
        .cta-button.primary:focus-visible {
            transform: translateY(-3px);
            box-shadow: 0 24px 54px -22px rgba(45, 166, 94, 0.95);
        }

        .cta-button.secondary {
            border: 1.8px solid rgba(226, 232, 240, 0.55);
            color: rgba(226, 232, 240, 0.85);
            background: transparent;
        }

        .cta-button.secondary:hover,
        .cta-button.secondary:focus-visible {
            background: rgba(226, 232, 240, 0.12);
            transform: translateY(-3px);
        }

        .cta-button svg {
            width: 1.05rem;
            height: 1.05rem;
        }

        .tagline {
            font-size: 0.82rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: rgba(203, 213, 225, 0.75);
        }

        @media (max-width: 640px) {
            .cta-group {
                gap: 0.75rem;
            }

            .cta-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main role="main">
        <div class="logo-badge">
            <img src="Logo.png" alt="Grace Tech Solutions" />
        </div>
        <p class="tagline">Resource Not Found</p>
        <h1>404</h1>
        <h2>The page took a detour.</h2>
        <p>We could not find the address you requested. Let us guide you back to the right place so your project keeps moving.</p>
        <div class="cta-group" role="navigation">
            <a class="cta-button primary" href="index.html">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="m3 11 9-8 9 8" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M5 9.5v11h5v-6h4v6h5v-11" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Back to Home
            </a>
            <button class="cta-button secondary" type="button" id="go-back">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12.75 5.75 7.5 11l5.25 5.25" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M16.5 11H7.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Previous Page
            </button>
        </div>
    </main>

    <script>
        const backButton = document.getElementById('go-back');
        if (backButton) {
            backButton.addEventListener('click', () => {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.location.href = 'index.html';
                }
            });
        }
    </script>
</body>
</html>
